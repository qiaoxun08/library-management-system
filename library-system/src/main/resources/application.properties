# Server Configuration
server.port=8080
server.servlet.context-path=/api

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/library_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.library.entity
mybatis.configuration.map-underscore-to-camel-case=true

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.database=0

# JWT Configuration
jwt.secret=${JWT_SECRET:dev-only-secret-key-change-in-production-32bytes!}
jwt.expiration=86400000

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Shanghai

# Logging Configuration
logging.level.com.library=INFO
logging.level.org.springframework.security=INFO

# Library Business Configuration
library.borrowing.default-days=30
library.borrowing.renew-days=30
library.borrowing.max-renew-count=2
library.fine.daily-rate=0.10
