# 开发环境配置
# 覆盖 application.properties 中的默认值

# 数据库配置（本地开发）
spring.datasource.url=jdbc:mysql://localhost:3306/library_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}

# JWT 密钥（开发环境使用固定值，生产环境必须更换）
jwt.secret=${JWT_SECRET:dev-only-secret-key-change-in-production-32bytes!}

# 日志级别
logging.level.com.library=DEBUG
logging.level.org.springframework.security=DEBUG
