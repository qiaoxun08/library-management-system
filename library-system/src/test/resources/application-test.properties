# 测试环境配置

# H2 内存数据库
spring.datasource.url=jdbc:h2:mem:library_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Schema 初始化
spring.sql.init.schema-locations=classpath:schema-h2.sql
spring.sql.init.mode=always

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.library.entity
mybatis.configuration.map-underscore-to-camel-case=true

# Redis - 禁用自动配置（单元测试不依赖 Redis）
spring.data.redis.repositories.enabled=false

# JWT
jwt.secret=test-secret-key-for-unit-tests-only-32bytes!
jwt.expiration=86400000

# 关闭验证码
library.captcha.enabled=false

# 关闭定时任务（集成测试中手动触发）
spring.task.scheduling.enabled=false

# 关闭 AOP 日志切面（减少测试噪音）
spring.aop.auto=false

# Jackson
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
